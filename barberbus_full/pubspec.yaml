name: barberbus
description: BarberBus Admin & Officer Flutter App
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0
  fl_chart: ^0.68.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  flutter_slidable: ^3.1.0
  gap: ^3.0.1
  badges: ^3.1.2
  lottie: ^3.1.2
  pull_to_refresh: ^2.0.0
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Barlow
      fonts:
        - asset: assets/fonts/Barlow-Regular.ttf
        - asset: assets/fonts/Barlow-Bold.ttf
          weight: 700
        - asset: assets/fonts/Barlow-SemiBold.ttf
          weight: 600
